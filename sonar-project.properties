sonar.projectKey=FelipeFuhr_ffreis-platform-runner
sonar.organization=felipefuhr
sonar.sources=.
sonar.exclusions=vendor/**,**/*_test.go
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.go.coverage.reportPaths=coverage.out

# TestFoo_Bar is the standard Go sub-test naming convention.
# Suppress the naming-convention rule (go:S100) for all test files.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go
