name: DevOps / Go CI

on:
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mod-tidy:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-mod-tidy-check.yml@2dc66b62be7f8685244fed807fcb160c7ba7af24
    with:
      go-version: "1.25.8"
      working-directory: "."

  fmt:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@2dc66b62be7f8685244fed807fcb160c7ba7af24
    with:
      go-version: "1.25.8"
      working-directory: "."

  lint:
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-lint.yml@2dc66b62be7f8685244fed807fcb160c7ba7af24 # fix: upgrade golangci-lint-action to v7
    with:
      go-version: "1.25.8"
      working-directory: "."

  test:
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@2dc66b62be7f8685244fed807fcb160c7ba7af24
    with:
      go-version: "1.25.8"
      working-directory: "."

