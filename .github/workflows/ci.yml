name: CI

# Triggers: every PR and every push to main.
# Job dependency graph:
#
#   secret-scan ─┐
#   fmt ─────────┼─→ lint ─┐
#                └─→ test ──┴─→ container-test ─→ container-build
#
# Any failure blocks all downstream jobs.
# GHCR push only runs on main of the origin repo (not fork PRs).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.8"
  GOLANGCI_LINT_VERSION: "v2.11.3"
  IMAGE: ${{ github.event.repository.name }}

jobs:

  # ── 1. Secret scan ─────────────────────────────────────────────────────────
  # Runs independently — credential leaks block everything else immediately.
  secret-scan:
    name: Secret Scan
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-gitleaks.yml@5dfbb4986ceb88f6518fa719da3a255294cf03cf
    with:
      working-directory: "."
      scan-history: true
      upload-sarif: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
  
  fmt:
    name: Format (gofmt)
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@a543ef895b5c2d6e4e7fe87245d440889c485b7c
    with:
      go-version: ${{ vars.GO_VERSION || '1.25.8' }}
      working-directory: "."

  # ── 3. Vet + Lint ──────────────────────────────────────────────────────────
  lint:
    timeout-minutes: 15
    name: Lint (vet + golangci-lint)
    runs-on: ubuntu-latest
    needs: [fmt]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: ${{ vars.GO_VERSION || env.GO_VERSION }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
        with:
          version: ${{ vars.GOLANGCI_LINT_VERSION || env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m
          working-directory: .

  # ── 4. Test + Coverage + Vulnerability scan ────────────────────────────────
  test:
    if: ${{ !github.event.pull_request.draft }}
    name: Test
    needs: [fmt]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@a543ef895b5c2d6e4e7fe87245d440889c485b7c
    with:
      go-version: ${{ vars.GO_VERSION || '1.25.8' }}
      working-directory: "."
      test-timeout: "120s"
      run-govulncheck: false
      coverage-artifact-name: "coverage"

  govulncheck:
    timeout-minutes: 15
    name: Dependency Security (govulncheck)
    runs-on: ubuntu-latest
    needs: [fmt]
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee
        with:
          go-version-file: go.mod
          check-latest: true
          work-dir: .
          cache: true
          go-package: ./...
          output-format: text

  # ── 5. Container test stage ────────────────────────────────────────────────
  # Builds the 'test' Containerfile stage which re-runs tests inside the same
  # base image used in production — catches base-image / runtime divergence.
  container-test:
    timeout-minutes: 30
    if: ${{ !github.event.pull_request.draft }}
    name: Container (test stage)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build test stage
        run: |
          docker build \
            --target test \
            --tag ${{ env.IMAGE }}:test-${{ github.sha }} \
            --file Containerfile \
            .

  # ── 6. Container final image ───────────────────────────────────────────────
  container-build:
    timeout-minutes: 30
    name: Container (final + push)
    runs-on: ubuntu-latest
    needs: [container-test]
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build final image
        run: |
          docker build \
            --target final \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --file Containerfile \
            .

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
