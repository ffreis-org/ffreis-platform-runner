name: Mutation Testing

on:
  schedule:
    - cron: "0 2 * * 0"   # Sundays 02:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mutation:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-mutation.yml@6a9b12a1c8b8a6a8ba0002a8077a1713ddf31be8
    with:
      packages: "./internal/runner/... ./internal/executor/..."
      threshold: 60
