name: Code Quality (SonarCloud)

on:
  pull_request:
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/code-quality.yml'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    # Set repository variable SONAR_ENABLED=false to skip this job entirely.
    # Default: runs. If SONAR_TOKEN is missing, fails explicitly with
    # instructions — never silently passes.
    #
    # Skip running on forked PRs (secrets are not available).
    if: vars.SONAR_ENABLED != 'false' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Full history for accurate blame and new-code detection

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.8"
          cache: true

      # ── Explicit credential check ────────────────────────────────────────
      # Fails with a clear message if required config is absent.
      # To disable this job entirely: Settings → Variables → add SONAR_ENABLED=false
      - name: Verify SonarCloud configuration
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          missing=""
          if [ -z "${SONAR_TOKEN}" ]; then
            missing="${missing}  • SONAR_TOKEN (secret): your SonarCloud token — sonarcloud.io → My Account → Security\n"
          fi
          if [ -n "${missing}" ]; then
            echo "::error title=SonarCloud not configured::Missing configuration:"
            printf "%b" "${missing}"
            echo ""
            echo "Add secrets: Settings → Secrets and variables → Actions → New repository secret"
            echo "Add variables: Settings → Secrets and variables → Actions → Variables tab"
            echo "To skip this job entirely: Settings → Variables → add SONAR_ENABLED=false"
            exit 1
          fi

      - name: Prepare SonarCloud arguments
        id: sonar-args
        env:
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          org="${SONAR_ORGANIZATION:-felipefuhr}"
          org="$(printf '%s' "${org}" | tr '[:upper:]' '[:lower:]')"

          repo_name="${GITHUB_REPOSITORY#*/}"
          project_key="${SONAR_PROJECT_KEY:-${GITHUB_REPOSITORY_OWNER}_${repo_name}}"

          base_ref="${BASE_REF:-main}"

          {
            echo "args<<EOF"
            echo "-Dsonar.projectKey=${project_key}"
            echo "-Dsonar.organization=${org}"
            echo "-Dsonar.newCode.referenceBranch=${base_ref}"
            echo "-Dsonar.go.coverage.reportPaths=coverage.out"
            echo "-Dsonar.sources=."
            echo "-Dsonar.exclusions=vendor/**,**/*_test.go"
            echo "-Dsonar.tests=."
            echo "-Dsonar.test.inclusions=**/*_test.go"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      # ── Coverage ────────────────────────────────────────────────────────────
      - name: Generate coverage for SonarCloud
        run: |
          go test ./... \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -count=1 \
            -timeout=120s

      # ── Scan ────────────────────────────────────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # nosemgrep: generic.secrets.security.detected-sonarqube-docs-api-key.detected-sonarqube-docs-api-key (pinned action SHA; not a secret)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: ${{ steps.sonar-args.outputs.args }}
