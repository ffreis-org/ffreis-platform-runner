remotes:
  - git_url: https://github.com/FelipeFuhr/ffreis-platform-standards
    ref: main
    configs:
      - lefthook/base.yml
      - lefthook/go.yml

pre-push:
  parallel: false
  commands:
    integration-tests:
      run: make test-integration
    quality-gates:
      run: make quality-gates
    generated-drift:
      run: make hook-generated-drift
